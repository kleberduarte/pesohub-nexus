services:
  pesohub-frontend:
    build:
      context: ../frontend
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://pesohub-backend:3000/api/v1
    depends_on:
      - pesohub-backend

  pesohub-backend:
    build:
      context: ../backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://pesohub:pesohub@postgres:5432/pesohub_nexus?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      - postgres
      - redis

  pesohub-worker:
    build:
      context: ../worker
    environment:
      DATABASE_URL: postgresql://pesohub:pesohub@postgres:5432/pesohub_nexus?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pesohub
      POSTGRES_PASSWORD: pesohub
      POSTGRES_DB: pesohub_nexus
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5436:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  postgres-data:
